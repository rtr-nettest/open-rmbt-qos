# Builds the runnable QoS server jar with Maven and uploads it as an artifact.
# Mirrors the RMBTControlServer "WAR build" workflow (jar instead of war).
name: JAR build

on:
  push:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: maven
      - name: Build jar with Maven
        run: mvn -B package
      - name: Archive jar
        uses: actions/upload-artifact@v4
        with:
          name: qosserver-jar
          path: target/RMBTQoSServer.jar
          retention-days: 90
